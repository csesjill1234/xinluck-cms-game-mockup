&lt;script&gt;
function openModal(id){document.getElementById(id).classList.add(&#x27;open&#x27;)}
function closeModal(id){document.getElementById(id).classList.remove(&#x27;open&#x27;)}
document.querySelectorAll(&#x27;.nav-item[data-page]&#x27;).forEach(item=&gt;{
  item.addEventListener(&#x27;click&#x27;,()=&gt;{
    document.querySelectorAll(&#x27;.nav-item[data-page]&#x27;).forEach(i=&gt;i.classList.remove(&#x27;active&#x27;));
    item.classList.add(&#x27;active&#x27;);
    const p=item.dataset.page;
    document.querySelectorAll(&#x27;.page&#x27;).forEach(pg=&gt;pg.classList.remove(&#x27;active&#x27;));
    document.getElementById(&#x27;page-&#x27;+p).classList.add(&#x27;active&#x27;);
    const group = item.previousElementSibling &amp;&amp; item.previousElementSibling.classList.contains(&#x27;nav-group&#x27;) ? item.previousElementSibling.textContent.trim() : &#x27;遊戲管理&#x27;;
    document.getElementById(&#x27;crumb&#x27;).textContent=group+&#x27; / &#x27;+item.textContent.trim();
  })
})
&lt;/script&gt;

&lt;script&gt;
(function(){
  var target = &#x27;categories&#x27;;
  function activate(){
    if(target){
      document.querySelectorAll(&#x27;.page&#x27;).forEach(function(p){p.classList.remove(&#x27;active&#x27;); p.style.display=&#x27;none&#x27;;});
      var el=document.getElementById(&#x27;page-&#x27;+target) || document.getElementById(target);
      if(el){el.classList.add(&#x27;active&#x27;); el.style.display=&#x27;block&#x27;;}
      document.querySelectorAll(&#x27;[data-page]&#x27;).forEach(function(n){n.classList.remove(&#x27;active&#x27;);});
      document.querySelectorAll(&#x27;[data-page=&quot;&#x27;+target+&#x27;&quot;]&#x27;).forEach(function(n){n.classList.add(&#x27;active&#x27;);});
    } else {
      var active=document.querySelector(&#x27;.page.active&#x27;); if(active) active.style.display=&#x27;block&#x27;;
    }
  }
  if(document.readyState===&#x27;loading&#x27;){document.addEventListener(&#x27;DOMContentLoaded&#x27;, activate);} else {activate();}
})();
&lt;/script&gt;

.layout{display:flex;min-height:100vh}.sidebar{width:260px;background:var(--side);color:#d6dbe7;flex-shrink:0}.brand{height:64px;background:var(--deep);display:flex;align-items:center;padding:0 22px;color:#fff;font-weight:800;font-size:18px}.nav-title{color:#8f98aa;font-size:12px;padding:18px 22px 8px}.nav-group{padding:10px 22px 6px;color:#fff;font-weight:800;font-size:14px}.nav-item{padding:10px 22px 10px 42px;border-left:4px solid transparent;font-size:14px;color:#d6dbe7}.nav-item.active{background:rgba(47,128,237,.14);border-left-color:var(--blue);color:#fff;font-weight:700}.nav-item.dim{color:#8f98aa}
.main{flex:1}.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 24px}.content{padding:24px}.head{display:flex;justify-content:space-between;gap:20px;margin-bottom:18px;align-items:flex-start}h1{font-size:24px;margin:0 0 8px}.desc{font-size:14px;color:var(--muted);line-height:1.6}.logic{margin-top:10px;background:#eef6ff;border:1px solid #cae0ff;color:#28507d;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7}
.btn{border:0;border-radius:6px;min-height:34px;padding:0 14px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer}.btn.primary{background:var(--blue);color:white}.btn.gray{background:#eef1f6}.btn.red{background:var(--red);color:white}.btn.green{background:var(--green);color:white}.btn.outline{background:#fff;border:1px solid #cfd6e4}
.card,.modal{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(32,42,68,.04);margin-bottom:18px;overflow:hidden}.card-hd,.modal-hd{padding:16px 18px;border-bottom:1px solid var(--line);font-weight:800;display:flex;justify-content:space-between;align-items:center}.card-bd,.modal-bd{padding:18px}
.filters{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr auto auto;gap:12px;align-items:end}.field label{display:block;font-size:12px;color:#5f6878;margin-bottom:6px;font-weight:700}.input,.select,.textarea{width:100%;border:1px solid #d8deea;background:var(--input);border-radius:6px;min-height:34px;padding:7px 10px;font-family:inherit}.textarea{min-height:90px}.rich{min-height:220px}.hint{font-size:12px;color:#8a93a3;margin-top:6px;line-height:1.5}.warn{color:#b32742;background:#fff8fa;border:1px solid #ffdce4;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.6;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:14px}th{text-align:left;background:#fafbfe;color:#5f6878;padding:12px 10px;border-bottom:1px solid var(--line)}td{padding:12px 10px;border-bottom:1px solid #eef0f5;vertical-align:middle}.cover{width:96px;aspect-ratio:987/493;border-radius:8px;background:linear-gradient(135deg,#8B0000,#CC6600 50%,#FFD700);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:900}.title{font-weight:800}.badge{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.blue{background:#e9f2ff;color:#236acb}.greenb{background:#e8f7ef;color:#10804a}.grayb{background:#eef1f6;color:#637083}.op{display:flex;gap:8px;flex-wrap:wrap}.link{color:var(--blue);font-weight:800;font-size:13px;cursor:pointer}.danger{color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.52);display:none;align-items:center;justify-content:center;z-index:99;padding:24px}.overlay.open{display:flex}.modal{width:980px;max-width:96vw;max-height:92vh;overflow:auto}.small-modal{width:480px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form3{display:grid;grid-template-columns:180px 1fr 1fr;gap:14px;align-items:end}.full{grid-column:1/-1}.req{color:var(--red)}.upload{height:130px;border:2px dashed #cbd3e2;border-radius:8px;background:#fbfcff;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#7b8494}.plus{width:36px;height:36px;border-radius:50%;background:#eef3fb;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}.modal-ft{padding:14px 18px;border-top:1px solid var(--line);background:#fafbfe;display:flex;justify-content:flex-end;gap:10px}.section-title{font-size:15px;font-weight:900;color:#3b4350;margin:8px 0 12px;border-left:4px solid var(--blue);padding-left:10px}.faq-box{border:1px solid #dde3ee;border-radius:8px;padding:12px;margin-bottom:10px;background:#fbfcff}.faq-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:800}.add-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}.message{font-size:15px;line-height:1.8;border-radius:8px;padding:14px}.success-msg{background:#f1fff6;border:1px solid #c8f0d8}.preview-link-box{background:#f7fbff;border:1px solid #d6e9ff;border-radius:8px;padding:14px;line-height:1.8;color:#334}
@media(max-width:1000px){.sidebar{display:none}.filters,.form,.form3{grid-template-columns:1fr}.full{grid-column:auto}}

.item{padding:10px 22px 10px 42px;color:#cfd6e4;border-left:4px solid transparent;cursor:pointer}
.item.active{background:#2f80ed33;border-left-color:var(--blue);color:#fff;font-weight:800}
.main{flex:1}
.top{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 24px}
.content{padding:24px}
.page{display:none}.page.active{display:block}
h1{margin:0 0 8px;font-size:24px}
.desc{font-size:14px;color:var(--muted);line-height:1.6}
.head{display:flex;justify-content:space-between;margin-bottom:18px;gap:20px}
.card,.modal{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 2px 8px rgba(32,42,68,.04);margin-bottom:18px;overflow:hidden}
.card h2,.modal-hd{font-size:16px;margin:0;padding:15px 18px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.body,.modal-bd{padding:18px}
.btn{background:#2f80ed;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:700}
.btn-green{background:#18a058}
.btn-red{background:#d03050}
.btn-gray{background:#eef1f6;color:#333}
.btn-outline{background:#fff;color:#333;border:1px solid #cfd6e4}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
.box{background:#fafbfc;border:1px solid #eee;border-radius:8px;padding:15px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px;border-bottom:1px solid #eee;text-align:left;vertical-align:middle}
th{background:#fafbfe;color:#5f6878}
.badge{padding:4px 8px;border-radius:20px;font-size:12px;font-weight:800;white-space:nowrap}
.wait{background:#fff3cd;color:#8a5a00}
.live{background:#d4edda;color:#106b38}
.off{background:#f8d7da;color:#9a1b30}
.gray{background:#eef1f6;color:#637083}
.link{color:#2f80ed;font-weight:bold;cursor:pointer}
.danger{color:#d03050}
.toolbar{display:flex;justify-content:flex-end;gap:10px;margin-bottom:12px}
.filters{display:grid;grid-template-columns:1fr 1fr 1fr auto auto;gap:12px;align-items:end}
.field label{display:block;font-size:12px;color:#5f6878;font-weight:700;margin-bottom:6px}
.input,.select,.textarea{width:100%;border:1px solid #d8deea;background:var(--input);border-radius:6px;min-height:34px;padding:7px 10px;font-family:inherit}
.textarea{min-height:120px}
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.52);display:none;align-items:center;justify-content:center;z-index:99;padding:24px}
.overlay.open{display:flex}
.modal{width:720px;max-width:96vw;max-height:92vh;overflow:auto}
.small{width:460px}
.modal-ft{padding:14px 18px;border-top:1px solid #eee;background:#fafbfe;display:flex;justify-content:flex-end;gap:10px}
.detail-grid{display:grid;grid-template-columns:120px 1fr;gap:10px 14px;line-height:1.7}
.message{font-size:15px;line-height:1.8;border-radius:8px;padding:14px}
.info{background:#f7fbff;border:1px solid #d6e9ff}
.warn{background:#fff8fa;border:1px solid #ffdce4}
.success{background:#f1fff6;border:1px solid #c8f0d8}
@media(max-width:1000px){.sidebar{display:none}.grid,.filters{grid-template-columns:1fr}}

})();

  permission:'系統管理 / 權限管理', log:'系統管理 / 操作紀錄'
};
function showMasterPage(key){
  document.querySelectorAll('.master-page').forEach(p=>p.classList.remove('active'));
  const page=document.getElementById('master-'+key); if(page) page.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.querySelector('.nav-item[data-target="'+key+'"]'); if(nav) nav.classList.add('active');
  document.getElementById('crumb').textContent = labels[key] || '';
}
document.querySelectorAll('.nav-item[data-target]').forEach(item=>{
  item.addEventListener('click',()=>showMasterPage(item.dataset.target));
});
</script>
